<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreezeSense - Commercial & Residential Ice Machine Monitoring</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230ea5e9'/%3E%3Cpath d='M50 20 L30 35 L50 50 L70 35 Z' fill='white'/%3E%3Cpath d='M50 40 L30 55 L50 70 L70 55 Z' fill='%23e0f2fe'/%3E%3Cpath d='M50 60 L30 75 L50 90 L70 75 Z' fill='white'/%3E%3C/svg%3E" />
    <!-- Load TailwindCSS first -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Load styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
        <div id="navigation"></div>
        <div id="main-content"></div>
        <div id="modals"></div>
    
    <!-- Error container for initialization -->
    <div id="init-error" class="fixed inset-0 bg-white p-4 hidden">
        <div class="max-w-2xl mx-auto mt-8 p-4 bg-red-50 border border-red-200 rounded-lg">
            <h2 class="text-lg font-semibold text-red-700">Initialization Error</h2>
            <p id="init-error-message" class="mt-2 text-red-600"></p>
        </div>
    </div>

    <!-- Load utility functions first -->
    <script src="js/utils.js"></script>
    <!-- Load UI functions after utils -->
    <script src="js/ui.js"></script>
    <script>
        // Check if required modules are loaded
        function checkModules() {
            return new Promise((resolve, reject) => {
                let attempts = 0;
                const maxAttempts = 20; // Increased attempts
                const checkInterval = 100; // ms

                function check() {
                    if (window.UI && window.Utils) {
                        resolve();
                    } else {
                        attempts++;
                        if (attempts >= maxAttempts) {
                            reject(new Error('Required modules not loaded: ' + 
                                (!window.UI ? 'UI ' : '') + 
                                (!window.Utils ? 'Utils' : '')));
                        } else {
                            setTimeout(check, checkInterval);
                        }
                    }
                }

                check();
            });
        }

        // Initialize the application
        async function initializeApp() {
            try {
                // Show initialization error container if needed
                const initError = document.getElementById('init-error');
                const initErrorMessage = document.getElementById('init-error-message');

                // Wait for modules to load
                await checkModules();

                // Initialize UI elements
                UI.initializeUIElements();

                // Load components
                const components = ['navigation', 'main-content', 'modals'];
                for (const component of components) {
                    const response = await fetch(`components/${component}.html`);
                    if (!response.ok) throw new Error(`Failed to load ${component}.html`);
                    const html = await response.text();
                    document.getElementById(component).innerHTML = html;
                }

                // Set up refresh interval
                const REFRESH_INTERVAL = 30000; // 30 seconds
                setInterval(() => {
                    fetchDevices().catch(error => {
                        UI.showError('Failed to refresh devices: ' + error.message);
                    });
                }, REFRESH_INTERVAL);

                // Initial devices fetch
                await fetchDevices();
                
            } catch (error) {
                console.error('Initialization failed:', error);
                // Show initialization error
                if (initError && initErrorMessage) {
                    initError.classList.remove('hidden');
                    initErrorMessage.textContent = 'Failed to initialize application: ' + error.message;
                }
            }
        }

        // Wait for DOM content to load before initializing
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
            } else {
            initializeApp();
        }
    </script>
</body>
</html>
